# Databricks Asset Bundle — "after" state for generating plan diffs.
#
# This file represents the desired state. After deploying databricks.yml (the "before" state),
# copy this file over databricks.yml and run `databricks bundle plan -o json` to capture the diff.
#
# See databricks.yml header for full workflow.

bundle:
  name: dagshund-test-bundle

resources:
  jobs:
    etl_pipeline:
      name: etl_pipeline
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
      tasks:
        - task_key: extract
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/extract

        - task_key: transform
          depends_on:
            - task_key: extract
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/transform_v2

        - task_key: load
          depends_on:
            - task_key: transform
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/load

        - task_key: aggregate
          depends_on:
            - task_key: load
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/aggregate

        - task_key: trigger_quality_check
          depends_on:
            - task_key: aggregate
          run_job_task:
            job_id: ${resources.jobs.data_quality_pipeline.id}

    data_quality_pipeline:
      name: data_quality_pipeline
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
      tasks:
        - task_key: setup_env
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/setup_env

        - task_key: validate_schema
          depends_on:
            - task_key: setup_env
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/validate_schema
            base_parameters:
              strict_mode: "true"
              sample_size: "10000"

        - task_key: check_nulls
          depends_on:
            - task_key: validate_schema
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/check_nulls

        - task_key: check_duplicates
          depends_on:
            - task_key: validate_schema
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/check_duplicates

        - task_key: check_referential_integrity
          depends_on:
            - task_key: validate_schema
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/check_referential_integrity

        - task_key: compute_statistics
          depends_on:
            - task_key: check_nulls
            - task_key: check_duplicates
          environment_key: default
          python_wheel_task:
            package_name: quality_metrics
            entry_point: compute_statistics
            parameters:
              - "--output"
              - "/dbfs/quality/stats"

        - task_key: anomaly_detection
          depends_on:
            - task_key: compute_statistics
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/anomaly_detection

        - task_key: aggregate_results
          depends_on:
            - task_key: check_nulls
            - task_key: check_duplicates
            - task_key: check_referential_integrity
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/aggregate_results

        - task_key: generate_report
          depends_on:
            - task_key: aggregate_results
            - task_key: anomaly_detection
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/generate_report

  schemas:
    analytics:
      catalog_name: dagshund
      name: analytics
      comment: "Analytics schema for production data"
      properties:
        owner: "data-engineering"
        environment: "production"

    analytics_staging:
      catalog_name: dagshund
      name: analytics_staging
      comment: "Staging schema for analytics data"
      properties:
        owner: "data-engineering"
        environment: "staging"

  volumes:
    raw_data:
      catalog_name: dagshund
      schema_name: analytics
      name: raw_data
      volume_type: MANAGED
      comment: "Raw data volume for ingestion pipeline"

    external_imports:
      catalog_name: dagshund
      schema_name: dagshund_no_dabs
      name: external_imports
      volume_type: MANAGED
      comment: "Import volume for external data feeds"

  experiments:
    audit_analysis:
      name: /Users/databricks.squiggly592@passfwd.com/audit_analysis

  alerts:
    stale_pipeline_alert:
      display_name: "Stale Pipeline Alert"
      query_text: "SELECT TIMESTAMPDIFF(HOUR, MAX(end_time), CURRENT_TIMESTAMP()) AS hours_since_last_run FROM system.lakeflow.job_run_timeline WHERE job_name = 'etl_pipeline'"
      warehouse_id: 799f096837f0aaaa
      schedule:
        quartz_cron_schedule: "0 0 * * * ?"
        timezone_id: "UTC"
      evaluation:
        comparison_operator: GREATER_THAN
        source:
          name: hours_since_last_run
        threshold:
          value:
            double_value: 24

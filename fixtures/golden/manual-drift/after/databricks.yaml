# yaml-language-server: $schema=../../bundle_config_schema.json
# Identical to before/ — all diff comes from UI drift, not config changes.
bundle:
  name: dagshund-golden-manual-drift
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    drift_pipeline:
      name: drift_pipeline
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: /Workspace/drift/ingest

        - task_key: transform
          depends_on:
            - task_key: ingest
          notebook_task:
            notebook_path: /Workspace/drift/transform

        - task_key: publish
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: /Workspace/drift/publish

  schemas:
    drift_doomed:
      catalog_name: ${var.catalog_name}
      name: drift_doomed

    drift_grants:
      catalog_name: ${var.catalog_name}
      name: drift_grants
      grants:
        - principal: data_engineers
          privileges:
            - USE_SCHEMA
            - CREATE_TABLE
        - principal: data_readers
          privileges:
            - USE_SCHEMA
            - SELECT

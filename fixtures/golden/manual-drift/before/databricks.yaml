# yaml-language-server: $schema=../../bundle_config_schema.json
# Drift test — deploy this, then manually edit the job in the Databricks UI
# before planning. See README.md in this directory.
bundle:
  name: dagshund-golden-manual-drift
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    drift_pipeline:
      name: drift_pipeline
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: /Workspace/drift/ingest

        - task_key: transform
          depends_on:
            - task_key: ingest
          notebook_task:
            notebook_path: /Workspace/drift/transform

        - task_key: publish
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: /Workspace/drift/publish

  schemas:
    # Whole-resource drift: the schema itself will be dropped on the remote,
    # leaving the bundle with a resource that does not exist upstream.
    drift_doomed:
      catalog_name: ${var.catalog_name}
      name: drift_doomed

    # Sub-entity drift, two dimensions:
    #   - data_engineers: the entire grant entry will be revoked on the remote
    #     (whole sub-entity drift).
    #   - data_readers:   only the SELECT privilege will be revoked, leaving
    #     USE_SCHEMA in place (partial sub-entity drift).
    drift_grants:
      catalog_name: ${var.catalog_name}
      name: drift_grants
      grants:
        - principal: data_engineers
          privileges:
            - USE_SCHEMA
            - CREATE_TABLE
        - principal: data_readers
          privileges:
            - USE_SCHEMA
            - SELECT

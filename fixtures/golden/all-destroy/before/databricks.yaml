# yaml-language-server: $schema=../../bundle_config_schema.json
# Full resource set — deployed first, then planned with empty "after" config.
# Same resource set as all-create/after.
bundle:
  name: dagshund-golden-all-destroy
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    etl_pipeline:
      name: etl_pipeline
      tasks:
        - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/extract

        - task_key: transform
          depends_on:
            - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/transform

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: /Workspace/etl/load

    data_quality_pipeline:
      name: data_quality_pipeline
      tasks:
        - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/setup_env

        - task_key: validate_schema
          depends_on:
            - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/validate_schema

        - task_key: check_nulls
          depends_on:
            - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/check_nulls

        - task_key: generate_report
          depends_on:
            - task_key: validate_schema
            - task_key: check_nulls
          notebook_task:
            notebook_path: /Workspace/quality/generate_report

  schemas:
    analytics:
      catalog_name: ${var.catalog_name}
      name: analytics

    analytics_staging:
      catalog_name: ${var.catalog_name}
      name: analytics_staging

  volumes:
    raw_data:
      catalog_name: ${var.catalog_name}
      schema_name: analytics
      name: raw_data
      volume_type: MANAGED

    external_imports:
      catalog_name: ${var.catalog_name}
      schema_name: analytics_staging
      name: external_imports
      volume_type: MANAGED

  experiments:
    audit_analysis:
      name: /Workspace/experiments/audit_analysis

  registered_models:
    quality_metrics:
      catalog_name: ${var.catalog_name}
      schema_name: ${var.models_schema}
      name: quality_metrics

  alerts:
    stale_pipeline_alert:
      display_name: stale_pipeline_alert
      warehouse_id: ${var.warehouse_id}
      query_text: "SELECT count(*) AS count FROM dagshund.analytics.raw_data"
      schedule:
        quartz_cron_schedule: "0 0 8 * * ?"
        timezone_id: UTC
      evaluation:
        comparison_operator: GREATER_THAN
        source:
          name: count
        threshold:
          value:
            double_value: 0

# yaml-language-server: $schema=../../bundle_config_schema.json
# First deploy of a data platform — everything is new.
# Narrative: raw files land in analytics_staging.landing, etl_pipeline curates
# them into the analytics schema, then triggers data_quality_pipeline. A
# freshness alert watches the curated output.
bundle:
  name: dagshund-golden-all-create
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    etl_pipeline:
      name: etl_pipeline
      tasks:
        - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/extract

        - task_key: transform
          depends_on:
            - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/transform

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: /Workspace/etl/load

        - task_key: trigger_quality_checks
          depends_on:
            - task_key: load
          run_job_task:
            job_id: ${resources.jobs.data_quality_pipeline.id}

    data_quality_pipeline:
      name: data_quality_pipeline
      tasks:
        - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/setup_env

        - task_key: validate_schema
          depends_on:
            - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/validate_schema

        - task_key: check_nulls
          depends_on:
            - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/check_nulls

        - task_key: generate_report
          depends_on:
            - task_key: validate_schema
            - task_key: check_nulls
          notebook_task:
            notebook_path: /Workspace/quality/generate_report

  schemas:
    analytics:
      catalog_name: ${var.catalog_name}
      name: analytics

    analytics_staging:
      catalog_name: ${var.catalog_name}
      name: analytics_staging

  volumes:
    landing:
      catalog_name: ${var.catalog_name}
      schema_name: analytics_staging
      name: landing
      volume_type: MANAGED

  alerts:
    stale_pipeline_alert:
      display_name: stale_pipeline_alert
      warehouse_id: ${var.warehouse_id}
      query_text: "SELECT count(*) AS count FROM dagshund.analytics.raw_data"
      schedule:
        quartz_cron_schedule: "0 0 8 * * ?"
        timezone_id: UTC
      evaluation:
        comparison_operator: GREATER_THAN
        source:
          name: count
        threshold:
          value:
            double_value: 0

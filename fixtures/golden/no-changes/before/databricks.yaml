# yaml-language-server: $schema=../../bundle_config_schema.json
# Baseline and after are identical — plan shows everything as skip/no_change.
bundle:
  name: dagshund-golden-no-changes
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    etl_pipeline:
      name: etl_pipeline
      tasks:
        - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/extract

        - task_key: transform
          depends_on:
            - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/transform

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: /Workspace/etl/load

  schemas:
    analytics:
      catalog_name: ${var.catalog_name}
      name: analytics

  volumes:
    raw_data:
      catalog_name: ${var.catalog_name}
      schema_name: analytics
      name: raw_data
      volume_type: MANAGED

  experiments:
    audit_analysis:
      name: /Workspace/experiments/audit_analysis

  alerts:
    stale_pipeline_alert:
      display_name: stale_pipeline_alert
      warehouse_id: ${var.warehouse_id}
      query_text: "SELECT count(*) AS count FROM dagshund.analytics.raw_data"
      schedule:
        quartz_cron_schedule: "0 0 8 * * ?"
        timezone_id: UTC
      evaluation:
        comparison_operator: GREATER_THAN
        source:
          name: count
        threshold:
          value:
            double_value: 0

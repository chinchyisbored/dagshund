# yaml-language-server: $schema=../../bundle_config_schema.json
# Sub-resource mutations:
# - test_job permissions: remove "viewers" entry, change admins level (update)
# - analytics grants: remove data_readers, add data_analysts (update)
bundle:
  name: dagshund-golden-sub-resources
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    test_job:
      name: test_job
      permissions:
        - level: CAN_MANAGE_RUN
          group_name: admins
      tasks:
        - task_key: run
          notebook_task:
            notebook_path: /Workspace/jobs/run

  schemas:
    analytics:
      catalog_name: ${var.catalog_name}
      name: analytics
      grants:
        - principal: data_engineers
          privileges:
            - USE_SCHEMA
            - CREATE_TABLE
            - MODIFY
        - principal: data_analysts
          privileges:
            - USE_SCHEMA
            - SELECT

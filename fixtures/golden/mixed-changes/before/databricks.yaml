# yaml-language-server: $schema=../../bundle_config_schema.json
# Baseline state for mixed-changes.
# After config adds, removes, updates, and leaves some unchanged.
bundle:
  name: dagshund-golden-mixed-changes
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  jobs:
    etl_pipeline:
      name: etl_pipeline
      tasks:
        - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/extract

        - task_key: transform
          depends_on:
            - task_key: extract
          notebook_task:
            notebook_path: /Workspace/etl/transform

        - task_key: load
          depends_on:
            - task_key: transform
          notebook_task:
            notebook_path: /Workspace/etl/load

        - task_key: validate
          depends_on:
            - task_key: load
          notebook_task:
            notebook_path: /Workspace/etl/validate

    data_quality_pipeline:
      name: data_quality_pipeline
      tasks:
        - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/setup_env

        - task_key: validate_schema
          depends_on:
            - task_key: setup_env
          notebook_task:
            notebook_path: /Workspace/quality/validate_schema
            base_parameters:
              sample_size: "1000"
              strict_mode: "false"

        - task_key: check_nulls
          depends_on:
            - task_key: validate_schema
          notebook_task:
            notebook_path: /Workspace/quality/check_nulls

        - task_key: compute_statistics
          depends_on:
            - task_key: check_nulls
          notebook_task:
            notebook_path: /Workspace/quality/compute_statistics

        - task_key: aggregate_results
          depends_on:
            - task_key: check_nulls
          notebook_task:
            notebook_path: /Workspace/quality/aggregate_results

        - task_key: generate_report
          depends_on:
            - task_key: aggregate_results
          notebook_task:
            notebook_path: /Workspace/quality/generate_report

        - task_key: notify_stakeholders
          depends_on:
            - task_key: generate_report
          notebook_task:
            notebook_path: /Workspace/quality/notify_stakeholders

  schemas:
    analytics:
      catalog_name: ${var.catalog_name}
      name: analytics

  volumes:
    raw_data:
      catalog_name: ${var.catalog_name}
      schema_name: analytics
      name: raw_data
      volume_type: MANAGED

    old_exports:
      catalog_name: ${var.catalog_name}
      schema_name: analytics
      name: old_exports
      volume_type: MANAGED

  experiments:
    audit_analysis:
      name: /Workspace/experiments/audit_analysis

  alerts:
    stale_pipeline_alert:
      display_name: stale_pipeline_alert
      warehouse_id: ${var.warehouse_id}
      query_text: "SELECT count(*) AS count FROM dagshund.analytics.raw_data"
      schedule:
        quartz_cron_schedule: "0 0 8 * * ?"
        timezone_id: UTC
      evaluation:
        comparison_operator: GREATER_THAN
        source:
          name: count
        threshold:
          value:
            double_value: 0

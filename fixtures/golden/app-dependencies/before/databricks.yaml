# yaml-language-server: $schema=../../bundle_config_schema.json
# First deploy: app with 3 lateral dependency types (job, sql_warehouse,
# uc_securable). Paired with after/ which is a SECOND deploy that adds a
# secret_scope + model_serving_endpoint resource and wires both into the
# app's resources list — they show as green (+) creates in the plan while
# the app shows as (~) update.
bundle:
  name: dagshund-golden-app-deps
  databricks_cli_version: ">=0.296.0"
  engine: direct

include:
  - ../../externals.yaml

resources:
  apps:
    my_test_app:
      name: my-test-app
      description: Test app with all resource dependency types
      source_code_path: ./app_src
      resources:
        - name: etl_job
          job:
            id: ${resources.jobs.my_etl_job.id}
            permission: CAN_MANAGE_RUN
        - name: warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: volume_data
          uc_securable:
            securable_full_name: ${var.catalog_name}.${var.models_schema}.${var.volume_name}
            securable_type: VOLUME
            permission: READ_VOLUME

  jobs:
    my_etl_job:
      name: my_etl_job
      tasks:
        - task_key: run
          notebook_task:
            notebook_path: /Workspace/app/run

  experiments:
    my_experiment:
      name: /Workspace/experiments/my_experiment

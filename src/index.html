<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dagshund</title>
    <script>
      (function() {
        var t = localStorage.getItem('dagshund-theme');
        if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) return;
        document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Suppress React Flow's benign ResizeObserver "loop completed" warning.
      // Must run before the dev server's error overlay registers its handler.
      window.addEventListener("error", function (e) {
        if (e.message && e.message.startsWith("ResizeObserver loop")) {
          e.stopImmediatePropagation();
        }
      });
    </script>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json", exclude = { glob = "{**/tsconfig.json,**/broken-*.json}" } },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "check-added-large-files", args = ["--maxkb=1024"] },
  { id = "detect-private-key" },
]

[[repos]]
repo = "local"
hooks = [
  { id = "ruff-check", name = "ruff check", entry = "ruff check --config=./pyproject.toml --force-exclude", language = "system", types = ["python"], require_serial = true, exclude = { glob = "fixtures/golden/**" } },
  { id = "ruff-format", name = "ruff format", entry = "ruff format --config=./pyproject.toml --force-exclude", language = "system", types = ["python"], require_serial = true, exclude = { glob = "fixtures/golden/**" } },
  { id = "ty-check", name = "ty check", entry = "ty check --project=.", language = "system", types = ["python"], require_serial = true, exclude = { glob = "fixtures/golden/**" } },
  { id = "biome-check", name = "biome check", entry = "bun run --cwd js lint", language = "system", pass_filenames = false },
  { id = "biome-format", name = "biome format", entry = "bun run --cwd js format:check", language = "system", pass_filenames = false },
  { id = "tsc", name = "tsc --noEmit", entry = "bun run --cwd js typecheck", language = "system", pass_filenames = false, require_serial = true },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.10.4"
hooks = [{ id = "uv-lock" }]

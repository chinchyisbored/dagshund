stages:
  - security
  - quality
  - build
  - smoke
  - release
  - pages

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
  GIT_DEPTH: 1
  # UV_IMAGE, BUN_VERSION, BUN_SHA256 are protected CI/CD variables in GitLab settings.

# --- Security (every push to main) ---
# SAST and secret detection run on branch pushes via template rules.
# Tag pipelines don't re-run security — the commit was already scanned on push.

sast:
  stage: security
  allow_failure: false

secret_detection:
  stage: security
  allow_failure: false

# --- Shared setup for release jobs ---

.release-setup:
  image: ${UV_IMAGE}
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl unzip > /dev/null
    - curl -fsSL -o /tmp/bun.zip "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
    - echo "${BUN_SHA256}  /tmp/bun.zip" | sha256sum --check
    - unzip -qo /tmp/bun.zip -d /tmp && mv /tmp/bun-linux-x64/bun /usr/local/bin/bun && ln -s bun /usr/local/bin/bunx && rm -rf /tmp/bun.zip /tmp/bun-linux-x64
    - uv sync --locked
    - bun install --frozen-lockfile --cwd js

# --- Quality gate (every push) ---

quality:
  extends: .release-setup
  stage: quality
  rules:
    - when: on_success
  script:
    # Lint
    - bun run --cwd js biome check src/ tests/
    - uv run ruff check src/ tests/
    # Typecheck
    - bun run --cwd js tsc --noEmit
    - uv run ty check src/ tests/
    # Test
    - bun test --cwd js --coverage --coverage-reporter=text
    - uv run pytest --cov=dagshund --cov-report=term-missing
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

# --- Version check (tag push only) ---

version-check:
  image: alpine:3
  stage: quality
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - |
      PKG_VERSION=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/dagshund/__init__.py)
      TAG_VERSION=${CI_COMMIT_TAG#v}
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: Package version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
        exit 1
      fi

# --- Build wheel (tag push only) ---

build:
  extends: .release-setup
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - quality
    - version-check
  script:
    - bun run --cwd js build:template
    - cp plugins/dagshund/skills/dagshund/SKILL.md src/dagshund/_assets/SKILL.md
    - uv build
    - sha256sum dist/* > dist/SHA256SUMS
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# --- Smoke tests (golden-file CLI output checks) ---

# Text-only smoke: runs on every push. No Bun needed — text mode has no JS dependency.
smoke-text:
  image: ${UV_IMAGE}
  stage: smoke
  variables:
    NO_COLOR: "1"
  rules:
    - when: on_success
  needs:
    - quality
  allow_failure: false
  before_script:
    - uv sync --locked
  script:
    - ./tests/golden/smoke.sh check

# Wheel smoke: runs on tags only. Tests the actual build artifact before release.
smoke-wheel:
  image: ${UV_IMAGE}
  stage: smoke
  variables:
    NO_COLOR: "1"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - quality
    - build
  allow_failure: false
  script:
    - uv venv /tmp/smoke-env
    - uv pip install --python /tmp/smoke-env/bin/python dist/*.whl
    - export PATH="/tmp/smoke-env/bin:$PATH"
    - DAGSHUND=dagshund ./tests/golden/smoke.sh check
    # HTML output (requires template baked into the wheel)
    - dagshund fixtures/complex-plan.json -o /tmp/smoke-out.html
    - test -s /tmp/smoke-out.html
    - grep -q "<html" /tmp/smoke-out.html

# --- Publish via OIDC trusted publishing ---
# uv natively detects PYPI_ID_TOKEN / TESTPYPI_ID_TOKEN and handles the exchange.
# Environment claims (release / release-test) are verified on the PyPI side.

publish-test:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
  image: ${UV_IMAGE}
  environment: release-test
  needs:
    - build
    - smoke-wheel
  id_tokens:
    TESTPYPI_ID_TOKEN:
      aud: testpypi
  script:
    - sha256sum --check dist/SHA256SUMS
    - uv publish --publish-url https://test.pypi.org/legacy/

publish:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
  image: ${UV_IMAGE}
  environment: release
  needs:
    - build
    - publish-test
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - sha256sum --check dist/SHA256SUMS
    - uv publish

# --- GitLab Pages demo site (every push to main) ---

pages:
  extends: .release-setup
  stage: pages
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - bun run --cwd js build:template
    - mkdir -p public
    - cp docs/pages/index.html public/index.html
    - uv run dagshund fixtures/complex-plan.json -o public/complex.html
    - uv run dagshund fixtures/all-hierarchies-plan.json -o public/all-hierarchies.html
  artifacts:
    paths:
      - public

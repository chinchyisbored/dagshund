# Databricks Asset Bundle for generating plan JSON fixtures.
#
# "Before" state — deploy this first, then swap to databricks-after.yml for the plan diff.
#
# Usage:
#   cd test-bundle/
#
#   # 1. Deploy the "before" state
#   DATABRICKS_BUNDLE_ENGINE=direct databricks bundle deploy
#
#   # 2. Swap to "after" state
#   cp databricks-after.yml databricks.yml
#
#   # 3. Capture plan
#   DATABRICKS_BUNDLE_ENGINE=direct databricks bundle plan -o json > ../tests/fixtures/complex-plan-with-resources.json
#
#   # 4. Restore "before" state
#   git checkout databricks.yml

bundle:
  name: dagshund-test-bundle

resources:
  jobs:
    etl_pipeline:
      name: etl_pipeline
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
      tasks:
        - task_key: extract
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/extract

        - task_key: transform
          depends_on:
            - task_key: extract
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/transform

        - task_key: load
          depends_on:
            - task_key: transform
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/load

        - task_key: validate
          depends_on:
            - task_key: load
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/etl/validate

    data_quality_pipeline:
      name: data_quality_pipeline
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
      tasks:
        - task_key: setup_env
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/setup_env

        - task_key: validate_schema
          depends_on:
            - task_key: setup_env
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/validate_schema
            base_parameters:
              strict_mode: "false"
              sample_size: "1000"

        - task_key: check_nulls
          depends_on:
            - task_key: validate_schema
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/check_nulls

        - task_key: compute_statistics
          depends_on:
            - task_key: check_nulls
          environment_key: default
          python_wheel_task:
            package_name: quality_metrics
            entry_point: compute_statistics
            parameters:
              - "--output"
              - "/dbfs/quality/stats"

        - task_key: aggregate_results
          depends_on:
            - task_key: check_nulls
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/aggregate_results

        - task_key: generate_report
          depends_on:
            - task_key: aggregate_results
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/generate_report

        - task_key: notify_stakeholders
          depends_on:
            - task_key: generate_report
          environment_key: default
          notebook_task:
            notebook_path: /Workspace/quality/notify_stakeholders

  schemas:
    analytics:
      catalog_name: dagshund
      name: analytics
      comment: "Analytics schema"
      properties:
        owner: "data-engineering"

  volumes:
    raw_data:
      catalog_name: dagshund
      schema_name: analytics
      name: raw_data
      volume_type: MANAGED
      comment: "Raw data volume"

  registered_models:
    quality_metrics:
      catalog_name: dagshund
      schema_name: analytics
      name: quality_metrics
      comment: "Quality metrics model"
